name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install
        run: pip install -q -e ".[dev]"
      - name: Lint
        continue-on-error: true
        run: ruff check .
      - name: Test
        run: pytest -q --tb=line
