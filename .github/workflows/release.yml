name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Release tag must start with 'v': {tag}")

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          expected_tag = f"v{project['version']}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Tag {tag!r} does not match pyproject.toml version {project['version']!r}; "
                  f"expected {expected_tag!r}."
              )
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install and verify generated wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import ztt"
          ztt --version
          ztt --help

      - name: Create GitHub Release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl \
            dist/*.tar.gz \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
